# Production stack for the Hetzner cax11 box (Falkenstein).
# Started by systemd unit fromtheloop.service; restart=unless-stopped covers ad-hoc daemon restarts.
# Day 4 ships Redis + Typesense + a worker placeholder so `docker ps` shows 3 services
# (reboot-resilience exit criterion). Day 6 replaces the placeholder with the real worker image.

services:
  redis:
    image: redis:7-alpine
    container_name: fromtheloop-redis
    restart: unless-stopped
    ports:
      # 6380: TLS port for external clients (Vercel via rediss://). Cert from Let's Encrypt
      # via certbot's DNS-01; deploy hook syncs certs into /opt/fromtheloop/certs.
      - "6380:6380"
    expose:
      # 6379: plain Redis for in-network containers (worker). Not exposed to host.
      - "6379"
    volumes:
      - redis_data:/data
      - /opt/fromtheloop/certs:/tls:ro
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      - --port
      - "6379"
      - --tls-port
      - "6380"
      - --tls-cert-file
      - /tls/fullchain.pem
      - --tls-key-file
      - /tls/privkey.pem
      - --tls-auth-clients
      - "no"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  typesense:
    image: typesense/typesense:27.1
    container_name: fromtheloop-typesense
    restart: unless-stopped
    expose:
      - "8108"
    volumes:
      - typesense_data:/data
    command:
      - --data-dir=/data
      - --api-key=${TYPESENSE_API_KEY:?TYPESENSE_API_KEY required}
      - --listen-port=8108
      - --enable-cors
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8108/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    image: fromtheloop-worker:latest
    pull_policy: never  # built locally on the box, not in a registry
    container_name: fromtheloop-worker
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-4}
      - NODE_ENV=production
      # Sentry: DSN no-ops when blank, so this is safe before the project is set up.
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  typesense_data:
