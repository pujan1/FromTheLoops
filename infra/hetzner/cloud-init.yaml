#cloud-config
# First-boot configuration for the FromTheLoop Hetzner CX22 box.
# Applied automatically by Hetzner when the server is created with --user-data-from-file.
# Idempotent: safe to re-run, though normally only executes once on first boot.

hostname: fromtheloop-worker-1
manage_etc_hosts: true

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - ufw
  - fail2ban
  - unattended-upgrades

write_files:
  - path: /etc/sysctl.d/99-fromtheloop.conf
    content: |
      vm.overcommit_memory=1
      net.core.somaxconn=1024

runcmd:
  # Docker from official repo (Ubuntu's docker.io lags behind upstream)
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - bash -c 'echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list'
  - apt-get update
  - DEBIAN_FRONTEND=noninteractive apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker
  # Firewall: SSH only by default. Day 6 will open whatever ports Vercel needs.
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw --force enable
  # SSH hardening (Hetzner injects authorized_keys; ensure password auth is off)
  - sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
  - sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - systemctl reload ssh
  - sysctl -p /etc/sysctl.d/99-fromtheloop.conf
  - systemctl enable --now fail2ban
  - touch /var/lib/cloud-init-complete
